<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>백수 주식회사 (baeksoo inc.)</title>
  <meta name="description" content="퇴사한 전 F&amp;B 마케터가 재취업을 자기고용 프로젝트로 대해보는 기록. 그 과정을 공유합니다." />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="백수 주식회사 (baeksoo inc.)" />
  <meta property="og:description" content="퇴사한 전 F&amp;B 마케터가 재취업을 자기고용 프로젝트로 대해보는 기록." />
  <meta property="og:url" content="https://baeksoo.kr/" />
  <!-- og:image 는 이미지 준비 후 추가 예정 -->
  <!-- Pretendard (오픈소스 웹폰트, jsDelivr CDN) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <main class="landing">

    <!-- ① 히어로: 프로필 사진 1장(1:1) + 소개 카피 -->
    <section class="hero">
      <div class="hero__inner">
        <!-- 캘리그래피(배경 없는 PNG) — 프로필 사진 위 -->
        <img class="hero__calligraphy" src="/assets/calligraphy.png" alt="" aria-hidden="true" />
        <!-- 추후 정식 사진 2장(정장/츄리닝) 확보 시 호버 전환 복원 가능 -->
        <div class="hero__photo">
          <img class="hero__img" src="/assets/profile1.jpg" alt="프로필" width="148" height="148" />
        </div>
        <div class="hero__copy">
          <p class="hero__lead">만 30살(곧 31),<br />퇴사한 1년차 전 F&amp;B 마케터,<br />현 전업 백수의</p>
          <p class="hero__strong">재취업을 위한 자기고용 프로젝트.<br />그 과정을 공유합니다.</p>
        </div>
      </div>
    </section>

    <!-- ② 영상 임베드 -->
    <section class="video">
      <div class="video__frame">
        <!--
          ⚠ 임시 테스트 영상(M7lc1UVf-VE). 발행 시 아래 embed/ 뒤의 ID를 실제 1화 영상 ID로 교체할 것.
          반드시 embed/ 경로 형태 유지 (watch?v= 형태는 임베드 안 됨).
        -->
        <iframe
          src="https://www.youtube.com/embed/M7lc1UVf-VE"
          title="1화"
          loading="lazy"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen></iframe>
      </div>
    </section>

    <!-- ③ 영상 아래 안내: 얇은 띠, 한 줄 -->
    <section class="guide">
      <p>오픈소스를 원칙으로 공유할 내용이 생기면<br />남겨두겠습니다. 코드 등 각종 훈수 환영</p>
    </section>

    <!-- ④ 칩 A / 칩 B: 가로 2칸 -->
    <section class="chips">
      <!-- 자료실 칩: 자료실 메뉴로 연결 (파일 3종은 downloads.html 로 이동) -->
      <a class="chip chip--link" href="/library">
        <span class="chip__label">자료실</span>
        <span class="chip__sub">코드·문서·템플릿</span>
        <span class="chip__empty">가져가 쓰기<span class="chip__arrow">→</span></span>
      </a>
      <!-- about 전업백수 칩: 컨테이너 + 버튼 2개로 두 페이지 분기 (칩 바깥은 링크 아님) -->
      <div class="chip chip--hub">
        <span class="chip__label">about 전업백수</span>
        <span class="chip__sub">나를 뜯어본 기록</span>
        <div class="chip__buttons">
          <a class="chip__btn" href="/career">과거이력 (+리멤버 데이터)<span class="chip__arrow">→</span></a>
          <a class="chip__btn" href="/me">메타인지 검사 결과<span class="chip__arrow">→</span></a>
        </div>
      </div>
    </section>

    <!-- ⑤ 위젯 자리: 밋밋한 흔적만 -->
    <section class="widget">
      <p class="widget__note">성과 추적 중</p>
    </section>

    <!-- ⑥ 채널 링크: 페이지에서 가장 또렷하게 -->
    <section class="channels">
      <a class="channel" href="https://www.instagram.com/baeksoo_inc" target="_blank" rel="noopener">인스타</a>
      <a class="channel" href="https://www.tiktok.com/@baeksoo_inc" target="_blank" rel="noopener">틱톡</a>
    </section>

  </main>

  <script src="/js/main.js"></script>
</body>
</html>
