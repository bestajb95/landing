<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>취업을 업으로 — 기록</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main>

    <!-- ① 히어로: 프로필 사진 1장(1:1) + 소개 카피(v2) -->
    <section class="hero">
      <div class="hero__inner">
        <!-- 추후 정식 사진 2장(정장/츄리닝) 확보 시 호버 전환 복원 가능 -->
        <div class="hero__photo">
          <img class="hero__img" src="assets/profile1.jpg" alt="프로필" width="320" height="320" />
        </div>
        <div class="hero__copy">
          <p>만 30살(곧 31)<br />퇴사한 1년차 전 F&amp;B 마케터,<br />현 전업 백수의</p>
          <p>재취업을 위한 자기고용 프로젝트.<br />그 과정을 공유합니다.</p>
        </div>
      </div>
    </section>

    <!-- ② 영상 임베드: 유튜브 iframe -->
    <section class="video">
      <div class="video__frame">
        <!--
          ⚠ 임시 테스트 영상(M7lc1UVf-VE) — 비율·레이아웃 검증용.
          구글 공식 YouTube IFrame API 문서의 임베드 데모 영상이라 외부 임베드가 안정적으로 허용됨.
          (직전의 aqz-KE-bpKQ/Big Buck Bunny는 오류 153 — 소유자 외부 임베드 차단으로 교체)
          발행 시 아래 embed/ 뒤의 ID를 실제 1화 영상 ID로 교체할 것.
          반드시 embed/ 경로 형태 유지 (watch?v= 형태는 임베드 안 됨).
        -->
        <iframe
          src="https://www.youtube.com/embed/M7lc1UVf-VE"
          title="1화"
          loading="lazy"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen></iframe>
      </div>
    </section>

    <!-- ③ 영상 아래 안내: 얇은 띠, 한 줄 (담담히) -->
    <section class="guide">
      <p>오픈소스를 원칙으로 공유할 내용이 생기면<br />남겨두겠습니다. 코드 등 각종 훈수 환영</p>
    </section>

    <!-- ④ 칩 A / 칩 B: 가로 2칸 -->
    <section class="chips">
      <!-- 자료실 칩: 다운로드 산출물 3종. 내부에 링크가 들어가므로 칩 자체는 <a>가 아님.
           파일이 없더라도 목록은 정상 렌더되고, 클릭 시에만 해당 파일을 받는다. -->
      <div class="chip chip--files">
        <span class="chip__label">자료실</span>
        <span class="chip__sub">코드·문서·템플릿</span>
        <ul class="chip__files">
          <li><a href="assets/downloads/doc1.docx" download>근로계약서</a></li>
          <li><a href="assets/downloads/doc2.docx" download>운영비예산안</a></li>
          <li><a href="assets/downloads/doc3.docx" download>인사평가표</a></li>
        </ul>
      </div>
      <!-- 실무 노트 칩: 과거 이력 페이지로 연결 (내용이 생겨 채워진 상태) -->
      <a class="chip" href="history.html">
        <span class="chip__label">실무 노트</span>
        <span class="chip__sub">마케팅 현장 기록</span>
        <span class="chip__empty">과거 이력 보기</span>
      </a>
    </section>

    <!-- ⑤ 위젯 자리: 밋밋한 흔적만. 숫자·그래프·급여 표현 금지 -->
    <section class="widget">
      <p class="widget__note">성과 추적 중</p>
    </section>

    <!-- ⑥ 채널 링크: 페이지에서 가장 또렷하게. URL 미정 → href="#" 자리 -->
    <section class="channels">
      <!-- 다음 TASK에서 각 href에 실제 채널 URL 연결 -->
      <a class="channel" href="#">스레드</a>
      <a class="channel" href="#">틱톡</a>
      <a class="channel" href="#">인스타</a>
    </section>

  </main>

  <script src="js/main.js"></script>
</body>
</html>
